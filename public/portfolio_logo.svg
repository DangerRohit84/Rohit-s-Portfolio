<svg width="64" height="64" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="logo-glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34d399" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>
    <filter id="neon-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <!-- Abstract Glowing Tech Hexagon -->
  <polygon points="50,15 80,32 80,68 50,85 20,68 20,32" fill="none" stroke="url(#logo-glow)" stroke-width="6" filter="url(#neon-glow)" stroke-linejoin="round" />
  <polygon points="50,15 80,32 80,68 50,85 20,68 20,32" fill="none" stroke="#10b981" stroke-width="4" stroke-linejoin="round" />
  
  <!-- Central Inner Core -->
  <circle cx="50" cy="50" r="14" fill="none" stroke="#34d399" stroke-width="4" />
  <circle cx="50" cy="50" r="6" fill="#34d399" filter="url(#neon-glow)" />
  
  <!-- Node connecting lines -->
  <line x1="50" y1="15" x2="50" y2="36" stroke="#34d399" stroke-width="3" />
  <line x1="20" y1="68" x2="38" y2="57" stroke="#34d399" stroke-width="3" />
  <line x1="80" y1="68" x2="62" y2="57" stroke="#34d399" stroke-width="3" />
</svg>
